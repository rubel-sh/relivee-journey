kind = "mobile"
previewPath = "/gps-tracker/"
title = "Journey GPS Tracker"
version = "1.0.0"
id = "artifacts/gps-tracker"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/gps-tracker/" ]
localPort = 20092

[services.development]
run = "pnpm --filter @workspace/gps-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gps-tracker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/gps-tracker", "run", "serve" ]

[services.env]
PORT = "20092"
BASE_PATH = "/gps-tracker/"
